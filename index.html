<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChillChaos | Estilo Urbano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica', Arial, sans-serif; scroll-behavior: smooth; }
        body { background-color: #ffffff; color: #000000; line-height: 1.6; }
        header { background-color: #000000; color: #ffffff; padding: 25px 5%; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; letter-spacing: 3px; position: sticky; top: 0; z-index: 1000; }
        header .logo { font-size: 28px; font-weight: 900; }
        header nav a { color: #ffffff; text-decoration: none; margin-left: 20px; font-size: 14px; font-weight: bold; }
        .hero { background-color: #000000; color: #ffffff; height: 450px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 10px solid #f0f0f0; }
        .hero h1 { font-size: 65px; font-weight: 900; margin-bottom: 10px; letter-spacing: 5px; }
        section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 32px; text-transform: uppercase; font-weight: 900; margin-bottom: 40px; text-align: center; border-bottom: 2px solid #000000; padding-bottom: 10px; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .produto-card { border: 2px solid #000000; padding: 20px; background: #ffffff; }
        .placeholder-img { width: 100%; height: 350px; background-color: #f9f9f9; border: 2px dashed #000000; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; overflow: hidden; }
        .placeholder-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .btn-comprar { width: 100%; padding: 14px; background-color: #000000; color: #ffffff; border: 1px solid #000000; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        footer { background-color: #000000; color: #ffffff; padding: 60px 20px; text-align: center; margin-top: 80px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CHILLCHAOS</div>
        <nav>
            <a href="#shop">Shop</a>
            <a href="#about">About</a>
            <a href="contacto.html">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>CHILLCHAOS</h1>
        <p>Premium Headwear & Street Style</p>
    </section>

    <section id="shop">
        <h2 class="section-title">Shop Collection</h2>
        <div class="grid-produtos">
            
            <div class="produto-card">
                <div class="placeholder-img"><img src="foto1.jpg" alt="Produto 1"></div>
                <div class="produto-info">
                    <h3>Item 01 // Street Cap</h3>
                    <span class="produto-preco">25.00€</span>
                    <button class="btn-comprar">Buy Now</button>
                </div>
            </div>

            <div class="produto-card">
                <div class="placeholder-img"><img src="foto2.jpg" alt="Produto 2"></div>
                <div class="produto-info">
                    <h3>Item 02 // Trucker Hat</h3>
                    <span class="produto-preco">30.00€</span>
                    <button class="btn-comprar">Buy Now</button>
                </div>
            </div>

            <div class="produto-card">
                <div class="placeholder-img"><img src="foto3.jpg" alt="Produto 3"></div>
                <div class="produto-info">
                    <h3>Item 03 // Beanie Chaos</h3>
                    <span class="produto-preco">20.00€</span>
                    <button class="btn-comprar">Buy Now</button>
                </div>
            </div>

        </div>
    </section>

    <footer>&copy; 2026 CHILLCHAOS STUDIO. All Rights Reserved.</footer>

</body>
</html>
